name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn package -q
        working-directory: plugins/cdata-changelog-review

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugins/cdata-changelog-review/target/cdata-changelog-review-mcp.jar
          generate_release_notes: true

      - name: Publish release branch with built JAR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create an orphan release branch with plugin files at the root
          git checkout --orphan release-tmp
          git rm -rf .
          cp plugins/cdata-changelog-review/target/cdata-changelog-review-mcp.jar .
          cp -r plugins/cdata-changelog-review/.claude-plugin .
          git add cdata-changelog-review-mcp.jar .claude-plugin/
          git commit -m "Release ${{ github.ref_name }}"
          git branch -M release-tmp release
          git push -f origin release
